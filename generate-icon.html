<!DOCTYPE html>
<html>
<head><title>Generate KIR Icons</title></head>
<body>
<canvas id="c192" width="192" height="192"></canvas>
<canvas id="c512" width="512" height="512"></canvas>
<script>
function drawIcon(canvas, size) {
    const ctx = canvas.getContext('2d');
    // Background dark
    ctx.fillStyle = '#050505';
    ctx.beginPath(); ctx.roundRect(0,0,size,size,size*0.15); ctx.fill();
    // Neon circle
    ctx.strokeStyle = '#00d4ff';
    ctx.lineWidth = size*0.04;
    ctx.shadowColor = '#00d4ff';
    ctx.shadowBlur = size*0.1;
    ctx.beginPath(); ctx.arc(size*0.5,size*0.45,size*0.2,0,2*Math.PI); ctx.stroke();
    // Text "KIR"
    ctx.fillStyle = '#00d4ff';
    ctx.shadowBlur = size*0.08;
    ctx.font = `bold ${size*0.25}px Poppins, sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText('KIR', size*0.5, size*0.7);
}
drawIcon(document.getElementById('c192'), 192);
drawIcon(document.getElementById('c512'), 512);
// Auto download
setTimeout(() => {
    document.getElementById('c192').toBlob(b => {
        const a = document.createElement('a');
        a.href = URL.createObjectURL(b);
        a.download = 'icon-kir-192.png'; a.click();
    });
    document.getElementById('c512').toBlob(b => {
        const a = document.createElement('a');
        a.href = URL.createObjectURL(b);
        a.download = 'icon-kir-512.png'; a.click();
    });
}, 1000);
</script>
</body>
</html>
